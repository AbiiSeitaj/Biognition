services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drscan
      POSTGRES_PASSWORD: drscan
      POSTGRES_DB: drscan
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://drscan:drscan@db:5432/drscan
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - pacs_storage:/app/storage
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  pacs_storage:
